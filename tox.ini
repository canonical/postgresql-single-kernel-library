[tox]
env_list = lint, unit

[vars]
src_path = {tox_root}/single_kernel_postgresql
tests_path = {tox_root}/tests
vm_test_charm_path = {[vars]tests_path}/charms/postgresql_vm_test_charm
k8s_test_charm_path = {[vars]tests_path}/charms/postgresql_k8s_test_charm
all_path = {[vars]src_path} {[vars]tests_path}

[testenv]
set_env =
    PYTHONPATH = {src_path}
    PYTHONBREAKPOINT=ipdb.set_trace
    PY_COLORS = 1
pass_env =
    PYTHONPATH
allowlist_externals =
    uv

[testenv:format]
description = Apply coding style standards to code
commands_pre =
    uv sync --active --group format --all-extras
commands =
    uv run --active ruff check --fix {[vars]all_path}
    uv run --active ruff format {[vars]all_path}


[testenv:lint]
description = Check code against coding style standards
commands_pre =
    uv sync --active --group lint --group format --all-extras
commands =
    uv lock --check
    uv run --active codespell "{tox_root}" --skip "{tox_root}/.git" --skip "{tox_root}/.tox" \
      --skip "{tox_root}/build" --skip "{tox_root}/venv" --skip "{tox_root}/.mypy_cache" \
      --skip "{tox_root}/LICENSE" --skip "{tox_root}/uv.lock" --skip "{[vars]vm_test_charm_path}/poetry.lock" \
      --skip "{[vars]k8s_test_charm_path}/poetry.lock"
    uv run --active ruff check {[vars]all_path} --exclude {[vars]src_path}/lib
    uv run --active ruff format --check --diff {[vars]all_path} --exclude {[vars]src_path}/lib
    # run last because it's slowest
    uv run --active ty check

[testenv:unit-vm]
description = Run unit tests using the VM substrate
commands_pre =
    uv sync --active --group unit --all-extras
commands =
    uv run --active coverage run --source={[vars]src_path} \
        -m pytest -v --tb native -s {posargs} {[vars]tests_path}/unit --substrate vm
    uv run --active coverage report
    uv run --active coverage xml

[testenv:unit-k8s]
description = Run unit tests using the K8S substrate
commands_pre =
    uv sync --active --group unit --all-extras
commands =
    uv run --active coverage run --source={[vars]src_path} \
        -m pytest -v --tb native -s {posargs} {[vars]tests_path}/unit --substrate k8s
    uv run --active coverage report
    uv run --active coverage xml

